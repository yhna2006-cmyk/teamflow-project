<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 팀 프로젝트 플로우</title>

    <style>
        body {
    		font-family: "Arial Rounded MT Bold", "Malgun Gothic", sans-serif;
    		background: linear-gradient(135deg, #ffe4f2, #fff5b7);
    		padding: 30px;
	}

        h1 {
            text-align: center;
	    font-size: 42px;
    	    color: #ff4fa3;
            text-shadow: 2px 2px 0px white;
        }

        .top-btn {
            text-align: center;
            margin-bottom: 20px;
        }

        .top-btn a {
            	text-decoration: none;
    		padding: 12px 24px;
    		background: #ffe066;
    		color: #7a4b00;
    		border-radius: 14px;
    		font-weight: bold;
        }

        .card {
    		background: white;
    		padding: 30px;
    		margin: 25px auto;
    		width: 100%;
    		border-radius: 30px;
    		box-shadow: 0 8px 25px rgba(255, 105, 180, 0.15);
    		border: 4px solid #ffd6eb;
		box-sizing: border-box;
		position: relative;
	}

        button {
   		background: #ff69b4;
    		color: white;
    		border: none;
    		padding: 12px 20px;
    		border-radius: 14px;
    		font-size: 16px;
    		font-weight: bold;
    		cursor: pointer;
	}

	button:hover {
    		transform: scale(1.05);
	}

        @keyframes fall {
            from {
                transform: translateY(0);
                opacity: 1;
            }
            to {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

	.task-form {
    		display: flex;
    		justify-content: space-between;
    		gap: 30px;
	}

	.left-section {
    		width: 40%;
	}

	.right-section {
    		width: 75%;
	}

	.right-section textarea {
    		width: 95%;
    max-width: 100%;
    box-sizing: border-box;
    margin-left: -10px;
    min-height: 220px;
    border-radius: 18px;
    padding: 18px;
    font-size: 18px;
    border: 3px solid #ffb6d9;
    background: #fff8fc;
    resize: vertical;
	}
	
	.save-btn {
    		margin-top: 15px;
    		background: #ff8ec7;
    		color: white;
    		border: none;
    		padding: 10px 18px;
    		border-radius: 12px;
    		font-weight: bold;
	}

	.download-btn {
    		background: #ffb6d9;
    		color: #7a2450;
    		padding: 8px 14px;
    		border-radius: 10px;
    		text-decoration: none;
    		font-weight: bold;
    		margin-left: 10px;
	}
	
	.delete-btn {
    position: absolute;
    right: 25px;
    bottom: 20px;
    display: inline-block;
    background: #ff6fae;
    color: white;
    padding: 12px 18px;
    border-radius: 14px;
    text-decoration: none;
    font-weight: bold;
    font-size: 18px;
    box-shadow: 0 4px 10px rgba(255, 105, 180, 0.3);
}

	.download-box a {
    display: block;
    margin-bottom: 8px;
    background: #ffe57f;
    color: #333;
    padding: 8px 12px;
    border-radius: 10px;
    text-decoration: none;
    width: fit-content;
}

    .memo-title {
    margin-left: -5px;
    font-weight: bold;
    font-size: 18px;
    color: #ff4fa3;
}

    .card p,
.card label,
.card select,
.card input,
.card textarea {
    font-size: 20px;
}

    select {
    font-size: 20px;
    padding: 8px 12px;
    border-radius: 10px;
}

    button {
    font-size: 18px;
    padding: 14px 22px;
}

    .card-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 25px;
    width: 95%;
    margin: 0 auto;
}

    @media (max-width: 768px) {
    .card-container {
        grid-template-columns: 1fr;
    }
}

    </style>
</head>

<body>

    <h1>🐵 TeamFlow 프로젝트 업무 관리🐵</h1>

    <div class="top-btn">
        <a href="/add/">+ 업무 추가</a>
    </div>
    <div class="card-container">
    {% for task in tasks %}
    <div class="card">
        <h2>{{ task.title }}</h2>
        <p id="countdown-{{ task.id }}"></p>

        <form method="POST" action="/update/{{ task.id }}/" enctype="multipart/form-data" class="task-form">
    {% csrf_token %}

    <div class="left-section">
        <p>담당자: {{ task.assignee }}</p>

        <p>
            상태:
            <select name="status">
                <option value="시작전" {% if task.status == "시작전" %}selected{% endif %}>시작전</option>
                <option value="진행중" {% if task.status == "진행중" %}selected{% endif %}>진행중</option>
                <option value="검토단계" {% if task.status == "검토단계" %}selected{% endif %}>검토단계</option>
                <option value="완료" {% if task.status == "완료" %}selected{% endif %}>완료</option>
            </select>
        </p>

        <label>
            <input type="checkbox" onclick="celebrate(this)">
            완료 체크
        </label>

        <p>마감일: {{ task.deadline }}</p>

        <p>
            우선순위:
            <input type="number" name="priority" value="{{ task.priority }}">
        </p>

        <p>
            파일 첨부:
            <input type="file" name="files" multiple>
        </p>

	<button type="submit" class="save-btn">💾 저장</button>
    </div>

    <div class="right-section">
	{% if task.files.all %}
    <div class="download-box">
        {% for f in task.files.all %}
            <a href="{{ f.file.url }}" class="download-btn" download>
                📑 {{ f.file.name|cut:"uploads/" }}
            </a><br>
        {% endfor %}
    </div>
{% endif %}
        <p class="memo-title">메모</p>
        <textarea name="memo" rows="8" cols="40">{{ task.memo }}</textarea>
    </div>

</form>

            <a href="/delete/{{ task.id }}/" class="delete-btn">삭제</a>
    </div>
    {% endfor %}
    </div>

    <script>
    function celebrate(checkbox) {
        if (checkbox.checked) {
            for (let i = 0; i < 20; i++) {
                let confetti = document.createElement("div");
                confetti.innerHTML = "🎉";

                confetti.style.position = "fixed";
                confetti.style.left = Math.random() * 100 + "vw";
                confetti.style.top = "0px";
                confetti.style.fontSize = "30px";
                confetti.style.zIndex = "9999";
                confetti.style.pointerEvents = "none";
                confetti.style.animation = "fall 2s linear forwards";

                document.body.appendChild(confetti);

                setTimeout(() => {
                    confetti.remove();
                }, 2000);
            }

            alert("업무 완료! 정말 잘했어요 👍");
        }
    }

    function updateCountdown() {
        {% for task in tasks %}
        let deadline{{ task.id }} = new Date("{{ task.deadline|date:'Y-m-d' }} 23:59:59");
        let now = new Date();

        let diff = deadline{{ task.id }} - now;

        if (diff > 0) {
            let days = Math.floor(diff / (1000 * 60 * 60 * 24));
            let hours = Math.floor((diff / (1000 * 60 * 60)) % 24);

            document.getElementById("countdown-{{ task.id }}").innerText =
                "⏳ " + days + "일 " + hours + "시간 남음";
        } else {
            document.getElementById("countdown-{{ task.id }}").innerText =
                "⏰ 마감됨";
        }
        {% endfor %}
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
    </script>

</body>
</html>
