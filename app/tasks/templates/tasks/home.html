<!DOCTYPE html>
<html>
<head>
    <title>TeamFlow</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 30px;
        }

        h1 {
           text-align: center;
           margin-bottom: 30px;
        }

       .card {
           background: white;
           border-radius: 15px;
           padding: 20px;
           margin: 15px auto;
           width: 70%;
           box-shadow: 0 4px 10px rgba(0,0,0,0.1);
       }

       a {
          text-decoration: none;
          padding: 8px 14px;
          border-radius: 8px;
          background: #007bff;
          color: white;
       }
    </style>
</head>
<body>
    <h1>📋 TeamFlow 업무 관리 시스템</h1>
    <a href="/add/">➕ 업무 추가</a>
    {% for task in tasks %}
    <div class="card">
        <div class="title">{{ task.title }}</div>
        <p>담당자: {{ task.assignee }}</p>
        <p>상태: {{ task.status }}</p>
        <p>마감일: {{ task.deadline }}</p>
        <a href="/delete/{{ task.id }}/">🗑 삭제</a>
    </div>
    {% empty %}
    <div class="card">
        <p>등록된 업무가 없습니다.</p>
    </div>
    {% endfor %}
</body>
</html>
