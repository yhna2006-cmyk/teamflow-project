<!DOCTYPE html>
<html>
<head>
    <title>업무 추가</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            padding: 40px;
        }
        .box {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>📝 업무 추가</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">추가하기</button>
        </form>
    </div>
</body>
</html>
